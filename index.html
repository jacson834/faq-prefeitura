<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FAQ - Secretarias Municipais de Pimenta Bueno</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #eef3f8;
            --bg-2: #f9fbfe;
            --ink-900: #11263c;
            --ink-700: #35506b;
            --ink-500: #56728f;
            --brand-700: #11436d;
            --brand-500: #1f5f92;
            --accent-500: #d89934;
            --surface: #ffffff;
            --surface-soft: #f7fafd;
            --line: #dce7f2;
            --shadow-lg: 0 24px 60px rgba(11, 43, 71, 0.12);
            --shadow-md: 0 10px 24px rgba(17, 52, 82, 0.08);
            --radius-xl: 30px;
            --radius-lg: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(1200px 500px at 8% -10%, rgba(31, 95, 146, 0.12), transparent 60%),
                radial-gradient(900px 400px at 95% 0%, rgba(216, 153, 52, 0.12), transparent 60%),
                linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
            color: var(--ink-900);
            line-height: 1.5;
            padding: 24px;
            min-height: 100vh;
        }

        /* Container principal */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            padding: 34px 34px 50px 34px;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }

        .container:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 70px rgba(11, 43, 71, 0.16);
        }

        /* Cabeçalho com logo da prefeitura */
        .header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 25px;
        }

        .prefeitura-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .prefeitura-logo img {
            max-height: 110px;
            width: auto;
            background: linear-gradient(180deg, #ffffff 0%, #f5f9ff 100%);
            padding: 10px 22px;
            border-radius: 60px;
            border: 1px solid #deebf7;
            box-shadow: var(--shadow-md);
        }

        /* Placeholders para logos (ícones ilustrativos) */
        .logo-placeholder {
            background: #0f3b5f;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            padding: 12px 24px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .logo-placeholder i {
            font-size: 1.3rem;
        }

        .titulo-principal {
            font-size: clamp(1.6rem, 2vw, 2.05rem);
            font-weight: 700;
            color: var(--brand-700);
            margin-top: 15px;
            letter-spacing: -0.02em;
        }

        .subtitulo {
            color: var(--ink-700);
            font-weight: 500;
            margin-top: 8px;
            font-size: 1.02rem;
        }

        /* Grid de logos das secretarias */
        .secretarias-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            background: linear-gradient(180deg, #f6faff 0%, #eef5fc 100%);
            padding: 20px 15px;
            border-radius: 48px;
            margin-bottom: 40px;
            align-items: center;
            border: 1px solid #dbe8f6;
        }

        .secretaria-item {
            background: var(--surface);
            border-radius: 60px;
            padding: 10px 12px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--brand-700);
            border: 1px solid #dbe8f6;
            box-shadow: 0 4px 10px rgba(20, 57, 87, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .secretaria-logo {
            width: 76px;
            height: 76px;
            object-fit: contain;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .secretaria-item:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 16px rgba(17, 67, 109, 0.12);
            border-color: #bfd7ef;
        }

        .secretaria-item i {
            font-size: 1.2rem;
        }

        /* Destaque para a secretaria ativa */
        .secretaria-item.active {
            background: linear-gradient(145deg, #144975 0%, #1f5f92 100%);
            color: #fff;
            border-color: #1f5f92;
            box-shadow: 0 12px 22px rgba(19, 65, 104, 0.35);
        }

        /* Área do FAQ acordeon */
        .faq-section {
            margin-top: 20px;
        }

        .faq-titulo-secretaria {
            font-size: 1.8rem;
            font-weight: 800;
            border-left: 7px solid var(--accent-500);
            padding-left: 20px;
            margin-bottom: 30px;
            color: var(--brand-700);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            letter-spacing: -0.02em;
        }

        .faq-titulo-secretaria i {
            font-size: 2rem;
            color: #f4b942;
        }

        .faq-titulo-logo {
            width: 34px;
            height: 34px;
            object-fit: contain;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            padding: 3px;
        }

        /* Acordeon */
        .accordion {
            border-radius: 24px;
            overflow: visible;
            box-shadow: none;
        }

        .faq-section-title {
            margin: 24px 0 12px 0;
            padding: 12px 16px;
            border-radius: 14px;
            background: linear-gradient(90deg, #e6f0fb 0%, #f6fbff 100%);
            color: #0b3b5f;
            font-size: 0.98rem;
            font-weight: 800;
            letter-spacing: 0.2px;
            border-left: 5px solid #1e4a76;
        }

        .faq-section-title,
        .accordion-item {
            opacity: 0;
            transform: translateY(16px) scale(0.995);
            animation: faqReveal 0.56s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: var(--reveal-delay, 0ms);
            will-change: transform, opacity;
        }

        .accordion-item {
            transform-origin: center top;
        }

        @keyframes faqReveal {
            0% {
                opacity: 0;
                transform: translateY(16px) scale(0.995);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .faq-section-title,
            .accordion-item {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }

        .faq-section-title:first-child {
            margin-top: 6px;
        }

        .faq-section-title.section-1 {
            background: linear-gradient(90deg, #e6f0fb 0%, #f4f9ff 100%);
            border-left-color: #1e4a76;
            color: #0b3b5f;
        }

        .faq-section-title.section-2 {
            background: linear-gradient(90deg, #eaf8ef 0%, #f7fcf9 100%);
            border-left-color: #1f7a45;
            color: #175e35;
        }

        .faq-section-title.section-3 {
            background: linear-gradient(90deg, #fff3e6 0%, #fffaf3 100%);
            border-left-color: #c66a1a;
            color: #8a4a12;
        }

        .faq-section-title.section-4 {
            background: linear-gradient(90deg, #f3ecff 0%, #faf7ff 100%);
            border-left-color: #6b46c1;
            color: #4b2f8f;
        }

        .accordion-item {
            background: #ffffff;
            border: 1px solid var(--line);
            margin-bottom: 16px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 6px 18px rgba(17, 52, 82, 0.05);
        }

        .accordion-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(17, 52, 82, 0.08);
        }

        .accordion-header {
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            padding: 18px 22px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--brand-700);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
            border-bottom: 1px solid transparent;
        }

        .accordion-header:hover {
            background: #f4f9ff;
        }

        .accordion-header .question-number {
            background: #ecf3fb;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            font-weight: bold;
            margin-right: 14px;
            color: var(--brand-700);
        }

        .accordion-header .question-text {
            flex: 1;
            padding-right: 15px;
        }

        .accordion-header .icon {
            font-size: 1.6rem;
            font-weight: 300;
            transition: transform 0.3s;
            color: var(--accent-500);
        }

        .accordion-item.active .accordion-header {
            background: #eef6ff;
            border-bottom-color: #c8def4;
        }

        .accordion-item.active .icon {
            transform: rotate(45deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            background: white;
            padding: 0 22px;
            border-bottom-left-radius: var(--radius-lg);
            border-bottom-right-radius: var(--radius-lg);
        }

        .accordion-item.active .accordion-content {
            max-height: 800px;  /* suficiente para conteúdo extenso */
            padding: 5px 22px 22px 22px;
        }

        .accordion-content p {
            margin-bottom: 14px;
            line-height: 1.6;
            color: #31485f;
        }

        .accordion-content strong {
            color: var(--brand-700);
        }

        .base-legal {
            background: var(--surface-soft);
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.9rem;
            margin-top: 15px;
            border-left: 4px solid var(--accent-500);
            color: var(--ink-700);
        }

        hr {
            margin: 16px 0;
            border: 0;
            height: 1px;
            background: #e2edf7;
        }

        footer {
            margin-top: 48px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--ink-500);
            border-top: 1px solid var(--line);
            padding-top: 25px;
        }

        @media (max-width: 680px) {
            .container {
                padding: 20px 16px;
            }

            body {
                padding: 14px;
            }

            .accordion-header {
                padding: 14px 16px;
                font-size: 0.9rem;
            }
            .faq-titulo-secretaria {
                font-size: 1.4rem;
            }
            .secretaria-item {
                padding: 8px 10px;
                font-size: 0.75rem;
            }

            .secretaria-logo {
                width: 56px;
                height: 56px;
            }

            .prefeitura-logo img {
                max-height: 82px;
                padding: 8px 14px;
            }
        }
    </style>
    <!-- Font Awesome para ícones ilustrativos (opcional, mas para placeholder) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <!-- Cabeçalho com logo da prefeitura -->
    <div class="header">
        <div class="prefeitura-logo">
            <img src="assets/PREFEITURA.png" alt="Logo da Prefeitura de Pimenta Bueno">
        </div>
        <h1 class="titulo-principal">PERGUNTAS GERAIS</h1>
        <p class="subtitulo">Atendimento e transparência — Tire suas dúvidas sobre serviços municipais</p>
    </div>

    <!-- Grid com as logos das secretarias (seguindo o modelo da imagem) -->
    <div class="secretarias-grid">
        <div class="secretaria-item active" data-secretaria="semfaz" aria-label="SEMFAZ" title="SEMFAZ">
            <img class="secretaria-logo" src="assets/SEMFAZ.png" alt="Logo SEMFAZ">
        </div>
        <div class="secretaria-item" data-secretaria="semagri" aria-label="SEMAGRI" title="SEMAGRI">
            <img class="secretaria-logo" src="assets/SEMAGRI.png" alt="Logo SEMAGRI">
        </div>
        <div class="secretaria-item" data-secretaria="semma" aria-label="SEMMA" title="SEMMA">
            <img class="secretaria-logo" src="assets/SEMMA.png" alt="Logo SEMMA">
        </div>
        <div class="secretaria-item" data-secretaria="semosp" aria-label="SEMOSP" title="SEMOSP">
            <img class="secretaria-logo" src="assets/SEMOSP.png" alt="Logo SEMOSP">
        </div>
        <div class="secretaria-item" data-secretaria="semsau" aria-label="SEMSAU" title="SEMSAU">
            <img class="secretaria-logo" src="assets/SEMSAU.png" alt="Logo SEMSAU">
        </div>
    </div>

    <!-- Área do FAQ (dinâmica - exibindo SEMFAZ por padrão) -->
    <div class="faq-section" id="faqContainer">
        <!-- Conteúdo carregado via JS conforme secretaria selecionada -->
    </div>

    <footer>
        <i class="fas fa-regular fa-circle-info"></i> Dúvidas frequentes atualizadas conforme Legislação Municipal • Pimenta Bueno - RO
    </footer>
</div>

<script>
    // DADOS DAS PERGUNTAS E RESPOSTAS PARA CADA SECRETARIA
    // Por enquanto implementamos completamente a SEMFAZ; as outras secretarias terão conteúdo exemplo
    // Você pode facilmente substituir ou ampliar conforme necessidade.
    
    const faqData = {
        semfaz: {
            nome: "SEMFAZ - Secretaria Municipal de Fazenda",
            logo: "assets/SEMFAZ.png",
            icone: "fas fa-calculator",
            perguntas: [
                {
                    secao: "Auditoria Tributária"
                },
                {
                    pergunta: "Minha empresa foi excluída do Simples Nacional pelo ente municipal, porém não consigo visualizar o débito para regularização no site da Prefeitura. Quais podem ser os motivos e o que devo fazer?",
                    resposta: `<p>A exclusão do Simples Nacional pode ocorrer por inadimplência de tributos municipais, estaduais ou federais, inconsistências cadastrais, atividade não permitida ou descumprimento de obrigações acessórias. Nem sempre o débito responsável pela exclusão aparece no site da Prefeitura. Assim, recomenda-se consultar também o Portal do Simples Nacional e, se necessário, entrar em contato com a <strong>Auditoria Tributária Municipal</strong> para identificar o motivo e obter orientações para regularização.</p>`
                },
                {
                    pergunta: "Escritório de contabilidade pode recolher ISS de forma anual?",
                    resposta: `<p>Não. Como regra, o Imposto Sobre Serviços (ISS) é devido de forma mensal, conforme a efetiva prestação dos serviços. O recolhimento em valor fixo ou anual somente é permitido quando houver previsão expressa na legislação municipal, hipótese que, em geral, se aplica a profissionais autônomos. No caso dos escritórios de contabilidade optantes pelo Simples Nacional, inexistindo autorização específica na legislação municipal para recolhimento fixo, o ISS deve ser obrigatoriamente recolhido de forma mensal, por meio do Documento de Arrecadação do Simples Nacional (DAS), integrando o regime unificado de tributação.</p><div class="base-legal"><strong>Base legal:</strong> Lei Complementar nº 123/2006, arts. 2º, 18 e § 6º; Resolução CGSN nº 140/2018, art. 25 e § 11.</div>`
                },
                {
                    pergunta: "Com a Reforma Tributária, como fica a emissão da Nota Fiscal de Serviços (NFS-e), a cobrança do ISS e a descrição dos serviços prestados?",
                    resposta: `<p>A cobrança do ISS permanece vinculada à efetiva prestação do serviço e à emissão da respectiva Nota Fiscal de Serviços Eletrônica (NFS-e). Cada serviço prestado deve ser descrito de forma clara e individualizada, especialmente quando envolver naturezas ou alíquotas distintas, a fim de garantir transparência e evitar inconsistências fiscais. O Município de Pimenta Bueno utiliza emissor local de NFS-e, adaptado ao Padrão Nacional, observando as regras vigentes durante o período de transição da Reforma Tributária. Os contribuintes devem permanecer atentos às alterações da legislação federal, bem como aos comunicados e normas expedidos pelo Comitê Gestor, além das orientações da Secretaria Municipal de Fazenda/Auditoria Tributária.</p>`
                },
                {
                    pergunta: "Quais são os critérios e requisitos para concessão da isenção do IPTU, conforme o art. 314 da Lei Complementar Municipal nº 011/2017 e suas alterações?",
                    resposta: `<p>A isenção do IPTU é concedida mediante requerimento do contribuinte que se enquadre nas hipóteses previstas na legislação municipal. O benefício aplica-se ao imóvel de propriedade e residência de aposentados, pensionistas, beneficiários do BPC, pessoas com idade superior a 65 anos, bem como portadores de neoplasia maligna ou seus dependentes, desde que também residam no imóvel.</p><p><strong>Requisitos cumulativos:</strong><br>• possuir apenas um imóvel residencial de até 700 UVF (com exceções legais para neoplasia maligna);<br>• renda familiar mensal de até 3 salários mínimos;<br>• imóvel sem locação total ou parcial;<br>• pedido protocolado até 30 de novembro do exercício anterior ao lançamento;<br>• Certidão Negativa de Débitos Municipais (CND) válida durante o benefício.</p>`
                },
                {
                    pergunta: "Quais são as condições para obtenção do desconto no IPTU referente a benfeitorias, conforme o art. 306 da Lei Complementar Municipal nº 011/2017?",
                    resposta: `<p>O desconto no IPTU por benfeitorias é concedido ao contribuinte que realizar a construção ou reconstrução da calçada em toda a testada do imóvel, ou comprovar que a calçada existente está em bom estado de conservação. Para usufruir do benefício, o interessado deve protocolar requerimento até 30 de novembro do exercício anterior ao lançamento do tributo e manter CND do imóvel durante todo o período de concessão.</p>`
                },
                {
                    pergunta: "O que é a progressividade do IPTU aplicada aos imóveis não edificados e por que o valor do imposto pode aumentar ao longo do tempo?",
                    resposta: `<p>A progressividade do IPTU para imóveis não edificados permite ao Município aumentar gradualmente a alíquota ao longo do tempo, enquanto o imóvel não cumprir sua função social. O objetivo é estimular o adequado aproveitamento do solo urbano, evitar terrenos ociosos e combater a especulação imobiliária.</p><div class="base-legal"><strong>Base legal:</strong> Art. 156, § 1º, incisos I e II, e art. 182, § 4º, inciso II, da Constituição Federal; Art. 291 da Lei Complementar Municipal nº 011/2017, com redação dada pela LC nº 17/2019; Art. 7º da Lei Federal nº 10.257/2001 (Estatuto da Cidade).</div>`
                },
                {
                    pergunta: "O Município pode fiscalizar o ITR e quais áreas do imóvel rural não são tributáveis por esse imposto?",
                    resposta: `<p>O ITR é de competência da União. Entretanto, o Município pode fiscalizar, lançar e cobrar esse imposto mediante convênio com a Receita Federal, passando a receber 100% da arrecadação local. Não são tributáveis as áreas legalmente protegidas, como APP, reserva legal, RPPN, áreas de interesse ecológico declaradas, servidão ambiental, florestas nativas em estágio médio ou avançado de regeneração e áreas alagadas para reservatórios autorizados.</p>`
                },
                {
                    pergunta: "Quais são as principais características da CBS e do IBS e como serão definidas suas alíquotas na Reforma Tributária?",
                    resposta: `<p>A CBS (federal) e o IBS (estadual e municipal) terão natureza de IVA, com base ampla de incidência sobre bens, serviços e direitos, tributação no destino e não cumulatividade plena. As alíquotas da CBS, IBS e Imposto Seletivo ainda serão definidas em lei. Durante a transição, poderão ocorrer ajustes anuais pelo Senado Federal. Estimativas apontam alíquota-padrão combinada entre 25,45% e 27%.</p>`
                },
                {
                    pergunta: "Como a Reforma Tributária afeta as empresas optantes pelo Simples Nacional e qual é o prazo de transição para os entes federados no IBS?",
                    resposta: `<p>A Reforma Tributária mantém o Simples Nacional e permite que empresas optantes escolham recolher IBS e CBS dentro do Simples ou fora dele, no regime normal. Na transição do IBS: 2029 (90% ISS + 10% IBS), 2030 (80% + 20%), 2031 (70% + 30%), 2032 (60% + 40%). A partir de 2033, o ISS será extinto. A redistribuição da arrecadação segue gradualmente até 2078.</p>`
                },
                {
                    secao: "Coordenadoria de Fiscalização Tributária"
                },
                {
                    pergunta: "Como solicito a Taxa de Funcionamento e a emissão do Alvará de Renovação Anual?",
                    resposta: `<p>A solicitação deve ser feita por peticionamento eletrônico no Sistema de Processos Eletrônicos (E-PROC), com direcionamento ao Departamento de Desenvolvimento Econômico e Mobiliário. Em caso de dúvidas, a Sala do Empreendedor atende pelo telefone (69) 99306-6416.</p>`
                },
                {
                    pergunta: "Quais são as documentações necessárias para a solicitação da guia de ITBI e qual o prazo para sua emissão?",
                    resposta: `<p>As documentações exigidas e o prazo de emissão estão regulamentados na Instrução Normativa nº 01, de 03/10/2025, disponível no Portal da Transparência: https://transparencia.pimentabueno.ro.gov.br/transparencia/aplicacoes/publicacao/detalhe_documento.php?id_publicacao=40953&nomeaplicacao=publicacao</p>`
                },
                {
                    pergunta: "A fiscalização tributária possui prazo para conclusão dos processos administrativos?",
                    resposta: `<p>Sim. Os prazos de análise e conclusão no âmbito da Fiscalização Tributária estão definidos na Instrução Normativa nº 02, de 17/11/2025: https://transparencia.pimentabueno.ro.gov.br/transparencia/aplicacoes/publicacao/download.php?id_doc=042016&extencao=PDF</p>`
                },
                {
                    pergunta: "Qual é a ordem de atendimento dos processos no setor de Fiscalização Tributária?",
                    resposta: `<p>Os processos são atendidos prioritariamente pela ordem cronológica de chegada ao setor e, depois, distribuídos de forma aleatória entre os Fiscais Tributários, observadas as competências legais.</p>`
                },
                {
                    pergunta: "Qual é a lei que institui o Código Tributário do Município de Pimenta Bueno e como posso acessá-la?",
                    resposta: `<p>O Código Tributário Municipal foi instituído pela Lei Complementar nº 011/2017. Consulta: https://leismunicipais.com.br/a1/codigo-tributario-pimenta-bueno-ro</p>`

    // Função para gerar HTML do acordeon (baseado nas perguntas/respostas)
    function renderAccordion(secretariaKey) {
        const data = faqData[secretariaKey];
        if (!data) return "<p>FAQ não disponível para esta secretaria no momento.</p>";
        
        const tituloIcone = data.logo
            ? `<img class="faq-titulo-logo" src="${data.logo}" alt="Logo ${data.nome}">`
            : `<i class="${data.icone}"></i>`;

        let html = `<div class="faq-titulo-secretaria">
                        ${tituloIcone}
                        <span>${data.nome}</span>
                    </div>
                    <div class="accordion" id="accordionFaq">`;
        
        let questionNumber = 0;
        let sectionNumber = 0;
        data.perguntas.forEach((item) => {
            if (item.secao) {
                sectionNumber += 1;
                html += `<div class="faq-section-title section-${sectionNumber}">${item.secao}</div>`;
                return;
            }

            questionNumber += 1;
            html += `
                <div class="accordion-item">
                    <div class="accordion-header" data-index="${questionNumber - 1}">
                        <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
                            <span class="question-number">${questionNumber}</span>
                            <span class="question-text">${item.pergunta}</span>
                        </div>
                        <div class="icon">+</div>
                    </div>
                    <div class="accordion-content">
                        ${formatResposta(item.resposta)}
                    </div>
                </div>
            `;
        });
        
        html += `</div>`;
        return html;
    }

    function formatResposta(resposta) {
        if (!resposta) return "";

        let output = resposta;

        // Converte URLs em links clicaveis.
        output = output.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');

        // Converte telefones brasileiros em links de WhatsApp.
        output = output.replace(/\(?(\d{2})\)?\s?(9?\d{4})-?(\d{4})/g, (match, ddd, parte1, parte2) => {
            const numero = `55${ddd}${parte1}${parte2}`;
            return `<a href="https://wa.me/${numero}" target="_blank" rel="noopener noreferrer">${match}</a>`;
        });

        return output;
    }

    // Carregar FAQ inicial (SEMFAZ)
    const faqContainer = document.getElementById("faqContainer");
    let currentSecretaria = "semfaz";
    
    function loadFAQ(secretariaId) {
        faqContainer.innerHTML = renderAccordion(secretariaId);
        currentSecretaria = secretariaId;
        applySectionAnimations();
        attachAccordionEvents();
    }

    function applySectionAnimations() {
        const animatedBlocks = faqContainer.querySelectorAll('.faq-section-title, .accordion-item');
        animatedBlocks.forEach((el, idx) => {
            const delay = Math.min(idx * 55, 900);
            el.style.setProperty('--reveal-delay', `${delay}ms`);
            el.style.animation = 'none';
            void el.offsetWidth;
            el.style.animation = '';
        });
    }

    // Ativar toggle dos acordeons
    function attachAccordionEvents() {
        const accordionItems = document.querySelectorAll('.accordion-item');
        accordionItems.forEach(item => {
            const header = item.querySelector('.accordion-header');
            header.removeEventListener('click', header.clickHandler);
            const clickHandler = () => {
                item.classList.toggle('active');
            };
            header.addEventListener('click', clickHandler);
            header.clickHandler = clickHandler;
        });
    }

    // Alternar secretarias ativas nos botões
    const secretariaElements = document.querySelectorAll('.secretaria-item');
    secretariaElements.forEach(btn => {
        btn.addEventListener('click', () => {
            const secretariaId = btn.getAttribute('data-secretaria');
            if (!secretariaId) return;
            // atualizar classe ativa
            secretariaElements.forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            loadFAQ(secretariaId);
        });
    });

    // Carregar inicialmente a SEMFAZ
    loadFAQ('semfaz');
</script>
